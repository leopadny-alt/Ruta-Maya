name: Deploy Ruta Maya to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installa le dipendenze
        run: npm ci

      - name: Crea la versione finale
        run: npm run build

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Carica i file
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Pubblica
        id: deployment
        uses: actions/deploy-pages@v4